<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcos do Vale —  Interiores</title>
<link rel="icon" href="imagens/logo.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #d6d7ce;
    --maroon:    #69131c;
    --maroon-dk: #4a0e15;
    --maroon-dkr:#350a0f;
    --ink:       #2a231f;
    --ink70:     rgba(42,35,31,0.72);
    --ink50:     rgba(42,35,31,0.5);
    --ink30:     rgba(42,35,31,0.3);
    --ink15:     rgba(42,35,31,0.15);
    --ink08:     rgba(42,35,31,0.08);
    --greige:    #d6d7ce;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 3rem;
    border-bottom: 1px solid var(--ink15);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .nav-brand { display: flex; align-items: center; gap: 0.65rem; text-decoration: none; }

  .nav-brand img {
    width: 30px;
    height: 30px;
    object-fit: contain;
    border-radius: 50%;
  }

  .nav-brand span {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink);
    font-weight: 700;
  }

  .nav-links, .nav-right { list-style: none; display: flex; gap: 2.5rem; }

  .nav-links a, .nav-right a {
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink70);
    font-weight: 500;
    transition: color 0.25s;
  }

  .nav-links a:hover, .nav-right a:hover { color: var(--maroon); }

  /* ── HERO ── */
  .hero {
    min-height: calc(100vh - 73px);
    display: flex;
    align-items: center;
    padding: 3rem 3rem;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--ink08) 1px, transparent 1px),
      linear-gradient(90deg, var(--ink08) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .hero-block {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 460px;
    margin-left: auto;
    margin-right: 9%;
  }

  .logo-wrap {
    width: 220px;
    height: 220px;
    margin-bottom: 1.75rem;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
  }

  .logo-wrap::before {
    content: '';
    position: absolute;
    inset: -20px;
    border: 1px solid var(--ink15);
    border-radius: 50%;
  }

  .logo-img { width: 100%; height: 100%; object-fit: contain; display: block; }

  .hero-word {
    font-weight: 800;
    font-size: clamp(2.6rem, 5.5vw, 4.6rem);
    letter-spacing: -0.02em;
